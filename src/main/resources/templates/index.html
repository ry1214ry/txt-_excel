<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TXT to Excel</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="page-shell">
    <section class="upload-card">
        <div class="card-intro">
            <p class="eyebrow">TXT to XLSX</p>
            <h1>Turn plain text into an Excel workbook</h1>
            <p class="subtitle">Upload a text file and the converter will save the spreadsheet into your export folder.</p>
        </div>

        <div class="message-stack" th:if="${errorMessage != null or successMessage != null}">
            <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>
        </div>

        <form method="post" enctype="multipart/form-data" action="/convert" class="upload-form">
            <label class="file-picker" for="file">
                <span class="file-label">Choose a TXT file</span>
                <span class="file-hint">Only plain text files with the <strong>.txt</strong> extension are accepted.</span>
                <input id="file" name="file" type="file" accept=".txt,text/plain" required>
            </label>

            <button class="submit-button" type="submit">Convert to Excel</button>
        </form>

        <section class="meta-grid" aria-label="Conversion details">
            <article class="info-tile">
                <p class="info-label">Accepted input</p>
                <strong>.txt</strong>
            </article>
            <article class="info-tile">
                <p class="info-label">Generated output</p>
                <strong>.xlsx</strong>
            </article>
        </section>

        <section class="download-box">
            <div class="result-header">
                <p class="download-label">Latest result</p>
                <span class="status-pill"
                      th:classappend="${outputFileName != null} ? ' status-pill-ready' : ''"
                      th:text="${outputFileName != null} ? 'Ready' : 'Waiting'">Waiting</span>
            </div>

            <p class="result-text" th:if="${outputFileName != null}">
                File name: <strong th:text="${outputFileName}"></strong>
            </p>

            <p class="download-path" th:if="${savedFilePath != null}"
               th:text="|Saved automatically to: ${savedFilePath}|"></p>

            <p class="result-text" th:if="${outputFileName == null}"
               th:text="|Convert a TXT file first. The Excel file will be created automatically in ${exportDirectoryDisplay}.|">
                Convert a TXT file first. The Excel file will be created automatically.
            </p>
        </section>
    </section>
</main>
</body>
</html>
